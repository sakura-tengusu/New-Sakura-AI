<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>てんぐすん。</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.16.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js"></script>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --sakura-50: #FFF0F5;
      --sakura-100: #FFD6E7;
      --sakura-200: #FFB3CF;
      --sakura-400: #F472A8;
      --sakura-600: #C44D87;
      --sakura-800: #7D1F52;
      --sakura-900: #3D0A26;
      --leaf-500: #5BA25B;
      --leaf-600: #3E7D3E;
      --amber-500: #D97706;
      --red-500: #DC2626;
      --bg: #FEF6F9;
      --surface: #FFFAFC;
      --border: rgba(196, 77, 135, 0.15);
      --border-mid: rgba(196, 77, 135, 0.28);
      --text-primary: #2D1018;
      --text-secondary: #7D4560;
      --text-muted: #B088A0;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --radius-xl: 32px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      color: var(--text-primary);
      padding: 0;
      overflow-x: hidden;
    }

    /* 桜の花びら背景 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(244,114,168,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 70%, rgba(244,114,168,0.05) 0%, transparent 45%),
        radial-gradient(ellipse at 50% 50%, rgba(255,214,231,0.04) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* 浮かぶ花びらアニメ */
    .petal {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
      animation: petalFall linear infinite;
    }
    .petal svg { fill: rgba(244,114,168,0.3); }
    @keyframes petalFall {
      0% { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.6; }
      100% { transform: translateY(100dvh) rotate(720deg); opacity: 0; }
    }

    /* レイアウト */
    .app {
      position: relative;
      z-index: 1;
      max-width: 440px;
      margin: 0 auto;
      padding: 0 0 3rem;
    }

    /* ヘッダー */
    .app-header {
      padding: 2.5rem 1.5rem 1.5rem;
      text-align: center;
    }
    .header-emblem {
      width: 68px;
      height: 68px;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, var(--sakura-100) 0%, var(--sakura-200) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 4px 20px rgba(196,77,135,0.18), inset 0 1px 0 rgba(255,255,255,0.7);
      border: 1.5px solid var(--border-mid);
    }
    .app-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--sakura-800);
      letter-spacing: 0.12em;
    }
    .app-subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
      letter-spacing: 0.05em;
    }

    /* カード */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin: 0 1rem 1rem;
      overflow: hidden;
    }
    .card-section {
      padding: 1.25rem 1.25rem 0;
    }
    .card-section:last-child { padding-bottom: 1.25rem; }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    /* ファイル入力 */
    .file-drop {
      border: 1.5px dashed var(--border-mid);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      background: var(--sakura-50);
    }
    .file-drop:hover { border-color: var(--sakura-400); background: #FFF0F8; }
    .file-drop input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .file-drop-icon { font-size: 1.8rem; margin-bottom: 0.4rem; }
    .file-drop-text { font-size: 0.82rem; color: var(--text-secondary); }

    /* カメラ起動ボタン */
    .btn-open-camera {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      text-align: center;
      justify-content: center;
    }

    /* iOSカメララッパー（全画面） */
    .ios-camera-wrap {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }
    /* 全画面中は背景スクロール禁止 */
    body.camera-open {
      overflow: hidden;
    }
    /* カメラ本体：幅100%・高さ16:9・上下余白なし */
    .ios-camera-inner {
      /* 上下余白なし: 高さ=画面全高、幅=9/16（画面幅を超えない） */
      height: 100dvh;
      width: min(100vw, calc(100dvh * 9 / 16));
      display: flex;
      flex-direction: column;
      background: #000;
      border-radius: 0;
      overflow: hidden;
    }
    /* 映像エリアはコントロールバー以外の残り全体 */
    .ios-camera-wrap .video-wrapper {
      flex: 1;
      width: 100%;
      aspect-ratio: unset;
    }
    /* カメラ切替中フラッシュ */
    .cam-switching-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
    }
    .cam-switching-overlay.flash {
      opacity: 1;
    }

    /* カメラボタン群（旧・互換用に残す） */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .btn {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.6rem 0.4rem;
      border: 1.5px solid var(--border-mid);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--sakura-600);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .btn:hover:not(:disabled) { background: var(--sakura-50); border-color: var(--sakura-400); }
    .btn:active:not(:disabled) { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn.active { background: var(--sakura-600); color: #fff; border-color: var(--sakura-600); }

    /* カメラビュー */
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #000;
      overflow: hidden;
    }
    video.main {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center center;
      min-width: 100%; min-height: 100%;
      width: auto; height: auto;
      display: none;
      will-change: transform;
    }
    .overlay-preview {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
      z-index: 5;
      cursor: pointer;
    }

    /* スライダーコントロール */
    /* iOSズームバー */
    .ios-zoom-bar {
      background: rgba(0,0,0,0.85);
      padding: 0.5rem 1rem;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
    }
    .ios-zoom-pills {
      display: flex;
      gap: 0.5rem;
    }
    .zoom-pill {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.12);
      border: none;
      border-radius: 99px;
      padding: 0.25rem 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .zoom-pill.active { background: rgba(255,220,0,0.85); color: #000; }
    .ios-zoom-slider {
      width: 80%;
      height: 2px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.25);
      border-radius: 1px;
      outline: none;
    }
    .ios-zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
    }
    .ios-zoom-val {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
    }

    /* 縦明るさスライダー（映像内右端） */
    .ios-brightness-wrap {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }
    .ios-brightness-track {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .ios-bright-icon { font-size: 0.85rem; }
    /* 縦スライダー：カスタムドラッグUI（writing-modeはマウス操作不可なので使わない） */
    .ios-brightness-slider { display: none; } /* 値の保持用・UIは非表示 */

    .ios-bright-track {
      width: 4px;
      height: 110px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      position: relative;
      cursor: ns-resize;
      touch-action: none;
    }
    .ios-bright-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #FFD60A;
      border-radius: 2px;
      transition: height 0.05s;
    }
    .ios-bright-thumb {
      position: absolute;
      left: 50%;
      transform: translate(-50%, 50%);
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
      cursor: ns-resize;
      touch-action: none;
    }
    .ios-bright-val {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.6);
      background: rgba(0,0,0,0.4);
      border-radius: 4px;
      padding: 0.1rem 0.2rem;
      text-align: center;
      margin-top: 2px;
    }

    /* iOSコントロールバー */
    .ios-controls {
      background: #000;
      padding: 1rem 1.5rem 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* 左サムネイル */
    .ios-thumb-wrap {
      width: 52px; height: 52px;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.15);
      background: transparent;
      flex-shrink: 0;
      cursor: default;
      position: relative;   /* mini-cameraのabsolute基準 */
    }
    .ios-thumb-wrap.has-image {
      border-color: rgba(255,255,255,0.4);
      background: #111;
      cursor: pointer;
    }
    .ios-thumb-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    /* srcが空・未設定のときは完全に非表示 */
    .ios-thumb-img:not([src]),
    .ios-thumb-img[src=""],
    .ios-thumb-img[src^="data:"]:not([src]) {
      display: none !important;
    }
    /* altテキストと壊れたアイコンを隠す */
    .ios-thumb-img:-moz-broken { display: none !important; }
    .ios-thumb-wrap:not(:has(img[src])) {
      background: transparent;
      border-color: transparent;
    }

    /* シャッターボタン */
    .ios-shutter {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 4px solid #fff;
      background: rgba(255,255,255,0.92);
      cursor: pointer;
      transition: transform 0.1s, background 0.1s;
      position: relative;
      flex-shrink: 0;
    }
    .ios-shutter::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: #fff;
    }
    .ios-shutter:active { transform: scale(0.93); background: rgba(200,200,200,0.9); }
    .ios-shutter:disabled { opacity: 0.35; cursor: not-allowed; }

    /* カメラ切替ボタン */
    .ios-switch {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .ios-switch:hover { background: rgba(255,255,255,0.25); }
    .ios-switch:disabled { opacity: 0.3; cursor: not-allowed; }

    /* 閉じるボタン：カメラ映像内の左上にオーバーレイ */
    .ios-close-btn {
      position: absolute;
      top: calc(12px + env(safe-area-inset-top));
      left: 12px;
      z-index: 40;
      background: rgba(0,0,0,0.45);
      border: none;
      color: #fff;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.35rem 0.85rem;
      border-radius: 99px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      /* タップ領域を広げる */
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.15s;
    }
    .ios-close-btn:hover { background: rgba(0,0,0,0.65); }

    /* 右上バスターボタン */
    .ios-buster-btn {
      position: absolute;
      top: calc(12px + env(safe-area-inset-top)); right: 12px;
      z-index: 40;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.5);
      background: rgba(0,0,0,0.4);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      backdrop-filter: blur(4px);
    }
    .ios-buster-btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .ios-buster-btn.on {
      background: rgba(251,191,36,0.85);
      border-color: #FCD34D;
    }
    .ios-buster-status {
      position: absolute;
      top: 52px; right: 8px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.62rem;
      padding: 0.2rem 0.5rem;
      border-radius: 8px;
      max-width: 120px;
      text-align: right;
      backdrop-filter: blur(4px);
      line-height: 1.4;
    }

    /* 旧スライダー関連（互換） */
    .slider-group { display: none; }
    .slider-row { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.4rem; }
    .slider-label { font-size: 0.68rem; color: var(--text-muted); min-width: 40px; }
    .slider-val { font-size: 0.72rem; color: var(--text-secondary); min-width: 38px; text-align: right; }

    /* 逆光バスター */
    .backlight-panel {
      margin-top: 0.75rem;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border-mid);
      overflow: hidden;
      background: var(--sakura-50);
    }
    .backlight-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 0.75rem 0.5rem;
    }
    .backlight-icon { font-size: 1.1rem; flex-shrink: 0; }
    .backlight-title-wrap { flex: 1; }
    .backlight-title {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-secondary);
    }
    .backlight-sub {
      display: block;
      font-size: 0.66rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }
    .backlight-toggle-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.4rem;
      padding: 0 0.75rem 0.65rem;
    }
    .buster-choice {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.55rem 0.4rem;
      border: 1.5px solid var(--border-mid);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .buster-choice.active {
      background: linear-gradient(135deg, #FEF3C7, #FDE68A);
      border-color: #F59E0B;
      color: #78350F;
    }
    .backlight-status {
      padding: 0 0.75rem 0.55rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      min-height: 1em;
      line-height: 1.5;
    }
    .backlight-canvas { display: none; }

    /* 撮影ガイドオーバーレイ */
    .guide-overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }
    /* フレーム枠（中央75%の正方形） */
    .guide-frame {
      position: absolute;
      top: 12.5%; left: 12.5%;
      width: 75%; height: 75%;
      transition: border-color 0.3s;
    }
    .frame-corner {
      position: absolute;
      width: 22px; height: 22px;
      border-color: rgba(255,255,255,0.85);
      border-style: solid;
    }
    .frame-corner.tl { top:0; left:0;  border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .frame-corner.tr { top:0; right:0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .frame-corner.bl { bottom:0; left:0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .frame-corner.br { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
    /* OK時は緑 */
    .guide-frame.ok .frame-corner { border-color: #4ADE80; }
    /* NG時はオレンジ */
    .guide-frame.warn .frame-corner { border-color: #FB923C; }

    /* メッセージバナー */
    .guide-banner {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      border-radius: 99px;
      padding: 0.35rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      transition: opacity 0.3s;
    }
    .guide-icon { font-size: 0.9rem; }
    .guide-msg {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      color: #fff;
    }
    /* OKバッジ（中央） */
    .guide-ok {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(74, 222, 128, 0.25);
      border: 2px solid #4ADE80;
      border-radius: 99px;
      padding: 0.3rem 1rem;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
      animation: okPulse 1.2s ease-in-out infinite;
    }
    @keyframes okPulse {
      0%,100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 0.7; transform: translate(-50%,-50%) scale(1.05); }
    }

    /* サムネイル */
    .preview-thumb {
      display: none;
      gap: 0.6rem;
      align-items: center;
      margin-top: 0.75rem;
    }
    .thumb-img {
      width: 76px; height: 76px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border-mid);
      cursor: pointer;
      flex-shrink: 0;
    }
    .mini-camera {
      width: 100%; height: 100%;
      border-radius: 0;
      overflow: hidden;
      background: #000;
      border: none;
      display: none;
      cursor: pointer;
      position: absolute;
      inset: 0;
    }
    .mini-camera video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-info { flex: 1; }
    .thumb-info p { font-size: 0.75rem; color: var(--text-secondary); }
    .btn-download {
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 0.72rem;
      padding: 0.35rem 0.6rem;
      border: 1.5px solid #B5D4F4;
      border-radius: var(--radius-sm);
      background: #E6F1FB;
      color: #185FA5;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-download:disabled { opacity: 0.45; cursor: not-allowed; }

    /* 判定ボタン */
    .btn-submit {
      display: block;
      width: calc(100% - 2rem);
      margin: 1.25rem 1rem 0;
      padding: 1rem;
      font-family: 'Zen Maru Gothic', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--sakura-600) 0%, var(--sakura-400) 100%);
      border: none;
      border-radius: var(--radius-xl);
      cursor: pointer;

<script>
// ====== モデル関連 ======
let models = { sakura: null, health: null, severity: null };
let modelClasses = {
  sakura: ["桜", "桜以外"],
  health: ["健康", "病気"],
  severity: ["初期", "中期", "深刻期"]
};

const modelUrls = {
  sakura:   "https://teachablemachine.withgoogle.com/models/pjM_yXs46/model.json",
  health:   "https://teachablemachine.withgoogle.com/models/k3U5df8h9/model.json",
  severity: "https://teachablemachine.withgoogle.com/models/1SydFWq8z/model.json"
};

async function loadModelFromUrl(key, url) {
  try {
    models[key] = await tf.loadLayersModel(url);
    try {
      const r = await fetch(url.replace(/model\.json$/, "metadata.json"));
      if (r.ok) { const j = await r.json(); if (j && j.labels) modelClasses[key] = j.labels; }
    } catch(_) {}
    return true;
  } catch(e) { console.error(`モデル読み込み失敗(${key}):`, e); return false; }
}

async function loadAllModels() {
  const results = await Promise.all([
    loadModelFromUrl('sakura',   modelUrls.sakura),
    loadModelFromUrl('health',   modelUrls.health),
    loadModelFromUrl('severity', modelUrls.severity)
  ]);
  if (results.every(r => r)) {
    statusDot.className = 'status-dot ok';
    modelStatusEl.innerHTML = '<span class="status-dot ok"></span>AIモデル読み込み完了';
    submitBtn.disabled = false;
  } else {
    const missing = ['sakura','health','severity'].filter((_,i)=>!results[i]);
    statusDot.className = 'status-dot err';
    modelStatusEl.innerHTML = `<span class="status-dot err"></span>⚠ 一部失敗: ${missing.join(', ')}`;
  }
}
loadAllModels();

// ====== Google フォーム送信設定（内部定数 — 研究チームのみ編集） ======
const FORM_ACTION_URL  = "https://docs.google.com/forms/d/YOUR_FORM_ID/formResponse";
const ENTRY_RESULT     = "entry.000000001"; // 判定結果
const ENTRY_CONFIDENCE = "entry.000000002"; // 確信度(%)
const ENTRY_MEMO       = "entry.000000003"; // メモ（任意）

async function sendToGoogleForm(resultText, confidence, memo) {
  if (!FORM_ACTION_URL || FORM_ACTION_URL.includes('YOUR_FORM_ID')) return;
  const body = new URLSearchParams();
  if (ENTRY_RESULT)     body.append(ENTRY_RESULT,     resultText);
  if (ENTRY_CONFIDENCE) body.append(ENTRY_CONFIDENCE, confidence);
  if (ENTRY_MEMO)       body.append(ENTRY_MEMO,       memo || '');
  try {
    await fetch(FORM_ACTION_URL, { method: 'POST', mode: 'no-cors', body });
  } catch(err) {
    console.warn('フォーム送信失敗:', err);
  }
}

// ====== DOM ======
const imageInput = document.getElementById('imageInput');
const preview = document.getElementById('preview');

// 閉じるボタン

// ズームピル
document.querySelectorAll('.zoom-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const z = parseFloat(pill.dataset.zoom);
    zoomSlider.value = z;
    zoomFactor = z; panX=0; panY=0; clampPan(); applyVideoTransform();

// バスターオーバーレイボタン
const busterOverlayBtn = document.getElementById('busterToggleOverlay');
busterOverlayBtn.addEventListener('click', () => {
  backlightOn = !backlightOn;
  busterOverlayBtn.classList.toggle('on', backlightOn);

// ====== 逆光バスター（自動解析・自動適用） ======
let backlightOn = true; // デフォルト「使う」
let shadowLift = 0;
let gammaVal = 1;
const backlightCanvas = document.getElementById('backlightCanvas');
const backlightCtx = backlightCanvas.getContext('2d');
const backlightStatusEl = document.getElementById('backlightStatus');

// 画像の明るさ・コントラストを自動解析してパラメータを決定
function analyzeImage(imageData) {
  const data = imageData.data;
  let sum = 0, count = 0;
  let darkPixels = 0; // 0〜0.3の割合
  let brightPixels = 0; // 0.7〜1.0の割合
  for (let i = 0; i < data.length; i += 16) { // 間引きサンプリング
    const r = data[i] / 255, g = data[i+1] / 255, b = data[i+2] / 255;
    const lum = 0.299 * r + 0.587 * g + 0.114 * b;
    sum += lum; count++;
    if (lum < 0.3) darkPixels++;
    if (lum > 0.7) brightPixels++;
  }
  const avgLum = sum / count;
  const darkRatio = darkPixels / count;
  const brightRatio = brightPixels / count;
  // コントラスト比（明部と暗部の共存 = 逆光の特徴）
  const contrastScore = darkRatio * brightRatio * 4; // 0〜1
  return { avgLum, darkRatio, brightRatio, contrastScore };
}

// 解析結果から最適なパラメータを決定
function decideParams(analysis) {
  const { avgLum, darkRatio, contrastScore } = analysis;
  let lift = 0, gamma = 1, label = '', emoji = '';

  // 逆光（暗い領域と明るい領域が共存）
  if (contrastScore > 0.15 && darkRatio > 0.25) {
    lift = 0.30 + contrastScore * 0.2;
    gamma = 1.7 + contrastScore * 0.5;
    label = '逆光を検出しました。暗部を持ち上げて補正します';
    emoji = '🌆';
  }
  // 全体的に暗い（暗所・曇り）
  else if (avgLum < 0.35) {
    const darkness = (0.35 - avgLum) / 0.35;
    lift = 0.15 + darkness * 0.35;
    gamma = 1.4 + darkness * 0.8;
    label = avgLum < 0.2 ? '暗所を検出しました。大きく明るさを補正します' : '薄暗さを検出しました。やや明るく補正します';
    emoji = avgLum < 0.2 ? '🌙' : '🌤';
  }
  // 十分明るい
  else {
    lift = 0; gamma = 1;
    label = '十分明るい写真です。補正は不要です';
    emoji = '✅';
  }

  lift = Math.min(0.55, Math.max(0, lift));
  gamma = Math.min(2.8, Math.max(1, gamma));
  return { lift, gamma, label, emoji };
}

// シャドウリフト＋ガンマ補正をピクセル単位で適用
function applyBacklightCorrection(imageData, lift, gamma) {
  if (lift === 0 && gamma === 1) return imageData;
  const data = new Uint8ClampedArray(imageData.data);
  const invGamma = 1.0 / gamma;
  for (let i = 0; i < data.length; i += 4) {
    for (let c = 0; c < 3; c++) {
      let v = data[i + c] / 255;
      v = v + lift * (1 - v) * (1 - v);
      v = Math.pow(Math.max(0, v), invGamma);
      data[i + c] = Math.min(255, Math.round(v * 255));
    }
  }
  return new ImageData(data, imageData.width, imageData.height);
}

function updateBacklightPreview() {
  backlightStatusEl.textContent = '';
  shadowLift = 0; gammaVal = 1;
  if (!inputImage || !inputImage.naturalWidth || !backlightOn) return;

  const size = 224;
  backlightCanvas.width = size; backlightCanvas.height = size;
  backlightCtx.drawImage(inputImage, 0, 0, size, size);
  const raw = backlightCtx.getImageData(0, 0, size, size);

  const analysis = analyzeImage(raw);
  const params = decideParams(analysis);
  shadowLift = params.lift;
  gammaVal = params.gamma;

  if (params.lift > 0) {
    backlightCtx.putImageData(applyBacklightCorrection(raw, shadowLift, gammaVal), 0, 0);
  }
  backlightStatusEl.textContent = params.emoji + ' ' + params.label;
}

async function startCamera() {
  stopCamera();
  const tries = [
    { video: { facingMode: { exact: currentFacingMode } }, audio: false },
    { video: { facingMode: currentFacingMode }, audio: false },
    { video: true, audio: false }
  ];
  let got = false;
  for (const c of tries) {
    try { stream = await navigator.mediaDevices.getUserMedia(c); got = true; break; } catch(e){}
  }
  if (!got) throw new Error('カメラ取得失敗');
  video.srcObject = stream;
  video.style.display = 'block';
  iosCameraWrap.style.display = 'flex';
  document.body.classList.add('camera-open');   // スクロール禁止・全画面
  toggleCameraBtn.style.display = 'none';
  captureBtn.disabled = false;
  switchCameraBtn.disabled = false;
  // バグ3: 撮影前はサムネイルをクリアして壊れた画像アイコンを消す
  if (!lastCapturedDataUrl) {
    const ti = iosThumbWrap ? iosThumbWrap.querySelector('img') : null;
    if (ti) ti.removeAttribute('src');
    if (iosThumbWrap) iosThumbWrap.classList.remove('has-image');
  } else {
    // 撮影済みがあれば表示を維持
    const ti = iosThumbWrap ? iosThumbWrap.querySelector('img') : null;
    if (ti && lastCapturedDataUrl) { ti.src = lastCapturedDataUrl; iosThumbWrap.classList.add('has-image'); }
  }
  isCameraOn = true;
  zoomFactor=1; panX=0; panY=0; applyVideoTransform();
  overlayPreview.style.display = 'none';

  // ハードウェアズーム検出
  const track = stream.getVideoTracks()[0];
  try {
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps && typeof caps.zoom !== 'undefined') {
      hardwareZoomRange = { min: caps.zoom.min||1, max: caps.zoom.max||1, step: caps.zoom.step||0.1 };
      zoomSlider.min = hardwareZoomRange.min; zoomSlider.max = hardwareZoomRange.max; zoomSlider.step = hardwareZoomRange.step;
    }
  } catch(_) {}

  zoomSlider.min = 1; zoomSlider.max = 3; zoomSlider.step = 0.1; zoomSlider.value = 1;
  zoomValue.textContent = '1.0×';
  document.querySelectorAll('.zoom-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.zoom === '1');
  });
  brightnessSlider.value = 0; brightnessValue.textContent = '+0.00';
  brightnessFactor = 0; applyBrightness();
  updateBrightUI(0); // バグ1修正: バーの位置を0にリセット

  // バグ2修正: overlayPreviewがカメラ画面に被らないよう確実にリセット
  overlayPreview.style.display = 'none';
  overlayPreview.style.position = '';
  overlayPreview.style.inset = '';
  overlayPreview.style.zIndex = '';
  overlayPreview.style.objectFit = '';
  overlayPreview.style.background = '';
  overlayPreview.onclick = null;
  viewState = 'MAIN_VIEW';

  sliderGroup.style.display = 'flex';
  brightnessSideWrap.style.display = 'flex';
  // バグ1: display:flex になってからUIを更新しないとheightが取れない
  requestAnimationFrame(() => updateBrightUI(0));
  startGuide();
}

function stopCamera() {
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; video.srcObject = null; video.style.display = 'none';
  captureBtn.disabled = true; switchCameraBtn.disabled = true;
  isCameraOn = false;

}

// EXIF ユーティリティ
function toExifDateString(d) {
  const p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}:${p(d.getMonth()+1)}:${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function decimalToDMSRational(dec) {
  dec = Math.abs(dec);
  const deg = Math.floor(dec);
  const minf = (dec - deg) * 60;
  const minutes = Math.floor(minf);
  const sec = Math.round((minf - minutes) * 6000);
  return [[deg,1],[minutes,1],[sec,100]];
}

captureBtn.addEventListener('click', async () => {
  if (!stream) return;
  // ガイドを一時停止
  if (guideTimer) { clearInterval(guideTimer); guideTimer = null; }
  guideOk.style.display = 'none';
  const W = video.videoWidth, H = video.videoHeight;
  if (!W || !H) return;
  const captureTime = new Date();
  lastCaptureMeta = { capturedAt: captureTime, coords: null };
  const getPos = () => new Promise(res => {
    if (!navigator.geolocation) return res(null);
    let done = false;
    navigator.geolocation.getCurrentPosition(
      pos => { if(!done){ done=true; res(pos.coords); } },
      () => { if(!done){ done=true; res(null); } },
      { enableHighAccuracy:true, timeout:3000, maximumAge:60000 }
    );
    setTimeout(() => { if(!done){ done=true; res(null); } }, 3500);
  });
  const posPromise = getPos();
  wrapperRect = videoWrapper.getBoundingClientRect();
  const wW = Math.round(wrapperRect.width), wH = Math.round(wrapperRect.height);
  const scaleToFill = Math.max(wW/W, wH/H);
  const factor = zoomFactor || 1;
  const cropW = Math.round(wW / (scaleToFill * factor));
  const cropH = Math.round(wH / (scaleToFill * factor));
  const cx = W/2 - (panX / (scaleToFill * factor));
  const cy = H/2 - (panY / (scaleToFill * factor));
  let sx = Math.round(cx - cropW/2), sy = Math.round(cy - cropH/2);
  sx = Math.max(0, Math.min(sx, W - cropW));
  sy = Math.max(0, Math.min(sy, H - cropH));
  const canvas = document.createElement('canvas');
  const size = Math.min(cropW, cropH);
  canvas.width = size; canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.filter = `brightness(${1 + brightnessFactor})`;
  ctx.drawImage(video, sx, sy, size, size, 0, 0, size, size);
  const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.92);
  const coords = await posPromise;
  if (coords) lastCaptureMeta.coords = { latitude: coords.latitude, longitude: coords.longitude, altitude: coords.altitude };
  try {
    const exifObj = {"0th":{},"Exif":{},"GPS":{},"1st":{},"thumbnail":null};
    const dateStr = toExifDateString(captureTime);
    exifObj["0th"][piexif.ImageIFD.DateTime] = dateStr;
    exifObj["Exif"][piexif.ExifIFD.DateTimeOriginal] = dateStr;
    if (coords) {
      exifObj["GPS"][piexif.GPSIFD.GPSLatitudeRef]  = coords.latitude  >= 0 ? "N" : "S";
      exifObj["GPS"][piexif.GPSIFD.GPSLongitudeRef] = coords.longitude >= 0 ? "E" : "W";
      exifObj["GPS"][piexif.GPSIFD.GPSLatitude]  = decimalToDMSRational(coords.latitude);
      exifObj["GPS"][piexif.GPSIFD.GPSLongitude] = decimalToDMSRational(coords.longitude);
    }
    lastCapturedDataUrl = piexif.insert(piexif.dump(exifObj), jpegDataUrl);
  } catch(_) { lastCapturedDataUrl = jpegDataUrl; }
  preview.src = lastCapturedDataUrl; overlayPreview.src = lastCapturedDataUrl;
  previewThumb.style.display = 'flex'; downloadBtn.disabled = false;
  // iosThumb（カメラ内左下）にも反映
  if (iosThumbWrap) {
    const ti = iosThumbWrap.querySelector('img');
    if (ti) ti.src = lastCapturedDataUrl;
    iosThumbWrap.classList.add('has-image');
  }
  inputImage = new Image();
  inputImage.crossOrigin = "anonymous";
  inputImage.onload = () => updateBacklightPreview();
  inputImage.src = lastCapturedDataUrl;
  resultCard.style.display = 'none';
  setMainView();
  // 撮影後ガイド再開
  setTimeout(() => { if (isCameraOn) startGuide(); }, 800);
});

// ====== カスタム縦スライダーUI（マウス・タッチ両対応） ======
function updateBrightUI(v) {
  const pct = (v + 1) / 2 * 100; // -1〜1 → 0〜100%
  const fill  = document.getElementById('brightFill');
  const thumb = document.getElementById('brightThumb');

(function initBrightDrag() {
  const track = document.getElementById('brightTrack');
  if (!track) return;
  let dragging = false;

  function valueFromY(clientY) {
    const rect = track.getBoundingClientRect();
    // 上が☀️(+1)、下が🌑(-1)
    const ratio = 1 - Math.max(0, Math.min(1, (clientY - rect.top) / rect.height));
    return parseFloat((-1 + ratio * 2).toFixed(2));
  }

  function applyVal(clientY) {
    const v = valueFromY(clientY);
    brightnessFactor = v;
    brightnessSlider.value = v;
    brightnessValue.textContent = (v >= 0 ? '+' : '') + v.toFixed(2);
    applyBrightness();
    updateBrightUI(v);
  }

  // マウス
  track.addEventListener('mousedown', e => {
    dragging = true; applyVal(e.clientY); e.preventDefault();
  });
  window.addEventListener('mousemove', e => { if (dragging) applyVal(e.clientY); });
  window.addEventListener('mouseup',   () => { dragging = false; });

  // タッチ（videoWrapperのpreventDefaultを避けるためstopPropagation）
  track.addEventListener('touchstart', e => {
    dragging = true; applyVal(e.touches[0].clientY);
    e.stopPropagation(); e.preventDefault();
  }, { passive: false });
  track.addEventListener('touchmove', e => {
    if (dragging) applyVal(e.touches[0].clientY);
    e.stopPropagation(); e.preventDefault();
  }, { passive: false });
  track.addEventListener('touchend', e => {
    dragging = false; e.stopPropagation();
  }, { passive: false });

  // 初期UI反映
  updateBrightUI(0);
})();

function applyBrightness() {
  const c = 1 + (brightnessFactor || 0);
  video.style.filter = `brightness(${c})`; miniCam.style.filter = `brightness(${c})`;
}
function applyVideoTransform() {
  video.style.transform = `translate(calc(-50% + ${panX}px), calc(-50% + ${panY}px)) scale(${zoomFactor})`;
}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function clampPan() {
  const W = video.videoWidth, H = video.videoHeight;
  if (!W || !H) return;
  wrapperRect = videoWrapper.getBoundingClientRect();
  const wW = wrapperRect.width, wH = wrapperRect.height;
  const s = Math.max(wW/W, wH/H);
  const vW = W*s*zoomFactor, vH = H*s*zoomFactor;
  const mx = Math.max(0,(vW-wW)/2), my = Math.max(0,(vH-wH)/2);
  panX = clamp(panX,-mx,mx); panY = clamp(panY,-my,my);
}

// ピンチ・パン
let isPanning=false, isPinching=false, pinchStartDist=0, pinchStartZoom=1;
let pinchCenter={x:0,y:0}, startPanX=0, startPanY=0, panStart={x:0,y:0};
const dist = (a,b) => Math.hypot(b.clientX-a.clientX, b.clientY-a.clientY);
const mid  = (a,b) => ({x:(a.clientX+b.clientX)/2, y:(a.clientY+b.clientY)/2});

videoWrapper.addEventListener('touchstart', ev => {
  if (!isCameraOn || viewState!=='MAIN_VIEW') return;
  // ボタン要素へのタッチは横取りしない
  if (ev.target.closest('button, input, a')) return;
  ev.preventDefault();
  wrapperRect = videoWrapper.getBoundingClientRect();
  if (ev.touches.length===1) {
    isPanning=true; isPinching=false;
    startPanX=panX; startPanY=panY; panStart={x:ev.touches[0].clientX,y:ev.touches[0].clientY};
  } else if (ev.touches.length===2) {
    isPinching=true; isPanning=false;
    pinchStartDist=dist(ev.touches[0],ev.touches[1]); pinchStartZoom=zoomFactor||1;
    const m=mid(ev.touches[0],ev.touches[1]);
    pinchCenter={x:m.x-wrapperRect.left-wrapperRect.width/2, y:m.y-wrapperRect.top-wrapperRect.height/2};
    panStart={x:panX,y:panY};
  }
},{passive:false});

videoWrapper.addEventListener('touchmove', ev => {
  if (!isCameraOn || viewState!=='MAIN_VIEW') return;
  if (ev.target.closest('button, input, a')) return;
  ev.preventDefault();
  wrapperRect = videoWrapper.getBoundingClientRect();
  if (isPinching && ev.touches.length>=2) {
    const d=dist(ev.touches[0],ev.touches[1]);
    if (pinchStartDist<=0) return;
    const newZ=clamp(pinchStartZoom*(d/pinchStartDist), parseFloat(zoomSlider.min||1), parseFloat(zoomSlider.max||3));
    const s=pinchCenter;
    panX=(panStart.x-s.x)*(newZ/pinchStartZoom)+s.x;
    panY=(panStart.y-s.y)*(newZ/pinchStartZoom)+s.y;
    zoomFactor=newZ; clampPan(); applyVideoTransform();
    zoomSlider.value=zoomFactor; zoomValue.textContent=zoomFactor.toFixed(1)+'×';
    updateZoomPills(zoomFactor);
  } else if (isPanning && ev.touches.length===1) {
    panX=startPanX+(ev.touches[0].clientX-panStart.x);
    panY=startPanY+(ev.touches[0].clientY-panStart.y);
    clampPan(); applyVideoTransform();
  }
},{passive:false});

videoWrapper.addEventListener('touchend', ev => {
  if (!isCameraOn) return;
  if (ev.target.closest('button, input, a')) return;
  ev.preventDefault();
  if (ev.touches.length===0) { isPanning=false; isPinching=false; }
  else if (ev.touches.length===1) {
    isPinching=false; isPanning=true;
    startPanX=panX; startPanY=panY; panStart={x:ev.touches[0].clientX,y:ev.touches[0].clientY};
  }
},{passive:false});

// マウス
let isMouseDown=false, mouseStart={x:0,y:0};
videoWrapper.addEventListener('mousedown', ev => {
  if (!isCameraOn || viewState!=='MAIN_VIEW') return;
  // input・button・a上のマウス操作は横取りしない
  if (ev.target.closest('input, button, a')) return;
  ev.preventDefault();
  isMouseDown=true; mouseStart={x:ev.clientX,y:ev.clientY}; startPanX=panX; startPanY=panY;
});
window.addEventListener('mousemove', ev => {
  if (!isCameraOn || !isMouseDown) return;
  panX=startPanX+(ev.clientX-mouseStart.x); panY=startPanY+(ev.clientY-mouseStart.y);
  clampPan(); applyVideoTransform();
});
window.addEventListener('mouseup', () => { isMouseDown=false; });
videoWrapper.addEventListener('wheel', ev => {
  if (!isCameraOn || viewState!=='MAIN_VIEW') return; ev.preventDefault();
  const newZ=clamp(zoomFactor*(ev.deltaY<0?1.05:0.95), parseFloat(zoomSlider.min||1), parseFloat(zoomSlider.max||3));
  wrapperRect=videoWrapper.getBoundingClientRect();
  const s={x:ev.clientX-wrapperRect.left-wrapperRect.width/2, y:ev.clientY-wrapperRect.top-wrapperRect.height/2};
  const old=zoomFactor; panX=(panX-s.x)*(newZ/old)+s.x; panY=(panY-s.y)*(newZ/old)+s.y;
  zoomFactor=newZ; clampPan(); applyVideoTransform();
  zoomSlider.value=zoomFactor; zoomValue.textContent=zoomFactor.toFixed(1)+'×';
  updateZoomPills(zoomFactor);
},{passive:false});

// ====== AI 判定 ======
function preprocessImage(img, size=224) {
  const c = document.createElement('canvas'); c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  // 逆光バスターがONの場合、補正済みピクセルで上書き
  if (backlightOn) {
    const raw = ctx.getImageData(0, 0, size, size);
    ctx.putImageData(applyBacklightCorrection(raw, shadowLift, gammaVal), 0, 0);
  }
  return tf.browser.fromPixels(c).expandDims(0).toFloat().div(tf.scalar(255));
}

async function predict(key, img) {
  if (!models[key]) return null;
  const t = preprocessImage(img, 224);
  const out = models[key].predict(t);
  const arr = await (Array.isArray(out) ? out[0] : out).data();
  tf.dispose([t, out]);
  let idx=0; for(let i=1;i<arr.length;i++) if(arr[i]>arr[idx]) idx=i;
  return { class: modelClasses[key][idx], idx, confidence: arr[idx] };
}

function showResult(html, type) {
  resultCard.style.display = 'block';
  resultCard.className = `result-card ${type}`;
  resultDiv.innerHTML = html;
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}


// ====== Grad-CAM ヒートマップ ======
const heatmapCard   = document.getElementById('heatmapCard');
const hmOrigCanvas  = document.getElementById('hmOrigCanvas');
const hmHeatCanvas  = document.getElementById('hmHeatCanvas');
const hmOrigCtx     = hmOrigCanvas.getContext('2d');
const hmHeatCtx     = hmHeatCanvas.getContext('2d');

// 熱カラーマップ（青→緑→黄→赤）
function heatColor(t) {
  // t: 0〜1
  const colors = [
    [59,130,246],   // blue
    [34,197,94],    // green
    [234,179,8],    // yellow
    [239,68,68],    // red
  ];
  const scaled = t * (colors.length - 1);
  const lo = Math.floor(scaled), hi = Math.min(lo + 1, colors.length - 1);
  const f = scaled - lo;
  return colors[lo].map((c, i) => Math.round(c + f * (colors[hi][i] - c)));
}

// モデルの最終Conv層名を推定して取得
function getLastConvLayer(model) {
  for (let i = model.layers.length - 1; i >= 0; i--) {
    const l = model.layers[i];
    if (l.getClassName().toLowerCase().includes('conv')) return l;
  }
  return null;
}

async function computeGradCAM(model, img, targetClassIdx) {
  const SIZE = 224;

  // 入力テンソル作成（逆光補正込み）
  const inputCanvas = document.createElement('canvas');
  inputCanvas.width = SIZE; inputCanvas.height = SIZE;
  const inputCtx = inputCanvas.getContext('2d');
  inputCtx.drawImage(img, 0, 0, SIZE, SIZE);
  if (backlightOn) {
    const raw = inputCtx.getImageData(0, 0, SIZE, SIZE);
    inputCtx.putImageData(applyBacklightCorrection(raw, shadowLift, gammaVal), 0, 0);
  }

  const lastConv = getLastConvLayer(model);
  if (!lastConv) return null;

  // lastConvの出力と最終出力を同時に得るサブモデル
  let featureModel, predModel;
  try {
    featureModel = tf.model({ inputs: model.inputs, outputs: lastConv.output });
    predModel    = tf.model({ inputs: model.inputs, outputs: model.outputs });
  } catch(e) {
    console.warn('Grad-CAM: サブモデル作成失敗', e);
    return null;
  }

  const inputTensor = tf.browser.fromPixels(inputCanvas)
    .expandDims(0).toFloat().div(tf.scalar(255));

  // 勾配計算
  const { grads, convOutput } = await tf.tidy(() => {
    const convOut = featureModel.predict(inputTensor); // [1, H, W, C]
    const gradsVal = tf.grad(x => {
      const preds = predModel.predict(x);
      // ターゲットクラスのスコアのみ
      return preds.slice([0, targetClassIdx], [1, 1]).squeeze();
    })(inputTensor);
    return { grads: gradsVal, convOutput: convOut };
  });

  // チャネル方向の平均勾配（Global Average Pooling）→ 重み
  const weights   = tf.tidy(() => grads.mean([0, 1, 2]));          // [C]
  const convOutSq = tf.tidy(() => convOutput.squeeze([0]));         // [H, W, C]

  // 加重和 → ReLU
  const cam = await tf.tidy(() => {
    const weighted = convOutSq.mul(weights.reshape([1, 1, -1]));   // [H, W, C]
    return weighted.sum(-1).relu();                                  // [H, W]
  }).data();

  const [camH, camW] = convOutput.shape.slice(1, 3);

  // 正規化（0〜1）
  let minV = Infinity, maxV = -Infinity;
  for (const v of cam) { if (v < minV) minV = v; if (v > maxV) maxV = v; }
  const range = maxV - minV || 1;
  const normCam = Array.from(cam).map(v => (v - minV) / range);

  tf.dispose([grads, convOutput, weights, convOutSq, inputTensor, featureModel, predModel]);

  return { normCam, camH, camW };
}

async function renderHeatmap(img, normCam, camH, camW) {
  const DISP = 320; // 表示解像度

  // 元画像を描画
  hmOrigCanvas.width = hmOrigCanvas.height = DISP;
  hmOrigCtx.drawImage(img, 0, 0, DISP, DISP);
  if (backlightOn) {
    const raw = hmOrigCtx.getImageData(0, 0, DISP, DISP);
    hmOrigCtx.putImageData(applyBacklightCorrection(raw, shadowLift, gammaVal), 0, 0);
  }

  // ヒートマップをDISPサイズに双線形補間して描画
  hmHeatCanvas.width = hmHeatCanvas.height = DISP;
  const heatImgData = hmHeatCtx.createImageData(DISP, DISP);
  const scale = DISP / camW; // camH==camW前提（正方形入力）

  for (let py = 0; py < DISP; py++) {
    for (let px = 0; px < DISP; px++) {
      // 双線形補間
      const cx = px / scale, cy = py / scale;
      const x0 = Math.floor(cx), y0 = Math.floor(cy);
      const x1 = Math.min(x0 + 1, camW - 1), y1 = Math.min(y0 + 1, camH - 1);
      const fx = cx - x0, fy = cy - y0;
      const v = normCam[y0*camW+x0]*(1-fx)*(1-fy)
               + normCam[y0*camW+x1]*fx*(1-fy)
               + normCam[y1*camW+x0]*(1-fx)*fy
               + normCam[y1*camW+x1]*fx*fy;

      const [r, g, b] = heatColor(v);
      const alpha = Math.round(v * 210); // 高スコアほど不透明
      const idx = (py * DISP + px) * 4;
      heatImgData.data[idx]   = r;
      heatImgData.data[idx+1] = g;
      heatImgData.data[idx+2] = b;
      heatImgData.data[idx+3] = alpha;
    }
  }
  hmHeatCtx.putImageData(heatImgData, 0, 0);
  heatmapCard.style.display = 'block';
  heatmapCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function runGradCAM(img) {
  heatmapCard.style.display = 'none';
  if (!models.health) return;
  try {
    // 健康モデルの「病気」クラス（idx=1）を対象にGrad-CAM
    const result = await computeGradCAM(models.health, img, 1);
    if (!result) return;
    await renderHeatmap(img, result.normCam, result.camH, result.camW);
  } catch(e) {
    console.warn('Grad-CAM 失敗:', e);
  }
}

submitBtn.addEventListener('click', async () => {
  if (!inputImage) { showResult('<div class="result-icon">📷</div><div class="result-label">画像を選んでください</div>', 'result-error'); return; }

  const run = async () => {

      if (s2.idx === 0) {
        const conf = (s2.confidence*100).toFixed(1);
        showResult(`<div class="result-icon">🌸</div><div class="result-label">健康です</div><span class="result-badge" style="background:#D1FAE5;color:#065F46">確信度 ${conf}%</span>`, 'result-healthy');
        await sendToGoogleForm('健康', conf, '');

      }

      // 段階3: 重症度判定

        await sendToGoogleForm('病気（重症度不明）', '--', '');
        await runGradCAM(inputImage);

      }
      const conf = (s3.confidence*100).toFixed(1);

        type='result-severe'; icon='🔴'; badge='深刻段階';

      showResult(`<div class="result-icon">${icon}</div><div class="result-label">病気の可能性があります</div><span class="result-badge" style="background:rgba(0,0,0,0.06)">${badge} / 確信度 ${conf}%</span><div class="contact-block"><div class="contact-title">🌸 日立市さくら課にご連絡ください</div><div class="contact-tel"><a href="tel:0294-22-3111" class="tel-link">📞 0294-22-3111</a></div><a href="https://www.city.hitachi.lg.jp/shisei/shinososhiki/1004565/1004570.html" target="_blank" rel="noopener" class="contact-form-btn">お問い合わせフォームはこちら →</a></div>`, type);
      await sendToGoogleForm(`病気（${sc}）`, conf, '');
      await runGradCAM(inputImage);

    } catch(err) {
      console.error(err);
      showResult('<div class="result-icon">⚠️</div><div class="result-label">判定に失敗しました<br><small style="font-size:0.75rem;opacity:0.6">画像やモデルを確認してください</small></div>', 'result-error');

  };

  if (inputImage.complete && inputImage.naturalWidth) { await run(); }
  else { inputImage.onload = run; }
});

// ====== 撮影ガイド（リアルタイム解析） ======
const guideOverlay  = document.getElementById('guideOverlay');
const guideFrame    = document.getElementById('guideFrame');
const guideBanner   = document.getElementById('guideBanner');
const guideIcon     = document.getElementById('guideIcon');
const guideMsg      = document.getElementById('guideMsg');
const guideOk       = document.getElementById('guideOk');
const guideCanvas   = document.getElementById('guideCanvas');
const guideCtx      = guideCanvas.getContext('2d');

let guideTimer = null;
let guideOkCount = 0; // OK状態が連続した回数（撮影ロックに使用）
const GUIDE_SIZE = 96; // 解析サンプル解像度

function startGuide() {
  guideOverlay.style.display = 'block';
  guideFrame.className = 'guide-frame';
  guideOk.style.display = 'none';
  setGuideBanner('📸', 'カメラを向けてください', false);
  guideOkCount = 0;
  if (guideTimer) clearInterval(guideTimer);
  guideTimer = setInterval(runGuideAnalysis, 400);
}

function stopGuide() {
  if (guideTimer) clearInterval(guideTimer);
  guideTimer = null;
  guideOverlay.style.display = 'none';
  guideOkCount = 0;
}

function setGuideBanner(icon, msg, isOk) {
  guideIcon.textContent = icon;
  guideMsg.textContent = msg;
  guideBanner.style.display = 'flex';
  if (isOk) {
    guideFrame.className = 'guide-frame ok';
    guideOk.style.display = 'block';
  } else {
    guideFrame.className = 'guide-frame warn';
    guideOk.style.display = 'none';
  }
}

function setGuideReady() {
  guideFrame.className = 'guide-frame ok';
  guideOk.style.display = 'block';
  guideIcon.textContent = '✅';
  guideMsg.textContent = 'シャッターを切ってください';
}

// ラプラシアン分散でピントスコアを計算（高いほどシャープ）
function calcSharpness(imageData, w, h) {
  const d = imageData.data;
  let sum = 0, count = 0;
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const idx = (y * w + x) * 4;
      // グレースケール輝度
      const c  = 0.299*d[idx]+0.587*d[idx+1]+0.114*d[idx+2];
      const t  = 0.299*d[idx-w*4]+0.587*d[idx-w*4+1]+0.114*d[idx-w*4+2];
      const b  = 0.299*d[idx+w*4]+0.587*d[idx+w*4+1]+0.114*d[idx+w*4+2];
      const l  = 0.299*d[idx-4]+0.587*d[idx-3]+0.114*d[idx-2];
      const r  = 0.299*d[idx+4]+0.587*d[idx+5]+0.114*d[idx+6];
      const lap = Math.abs(4*c - t - b - l - r);
      sum += lap; count++;
    }
  }
  return count > 0 ? sum / count : 0;
}

// 中央領域の平均輝度（0〜1）
function calcCenterBrightness(imageData, w, h) {
  const d = imageData.data;
  const x0=Math.floor(w*0.25), x1=Math.floor(w*0.75);
  const y0=Math.floor(h*0.25), y1=Math.floor(h*0.75);
  let sum=0, count=0;
  for (let y=y0;y<y1;y++) {
    for (let x=x0;x<x1;x++) {
      const i=(y*w+x)*4;
      sum += 0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
      count++;
    }
  }
  return count>0 ? sum/count/255 : 0;
}

// エッジ密度（被写体の存在感）
function calcEdgeDensity(imageData, w, h) {
  const d = imageData.data;
  const cx=Math.floor(w/2), cy=Math.floor(h/2);
  const rx=Math.floor(w*0.3), ry=Math.floor(h*0.3);
  let edgeCount=0, total=0;
  for (let y=cy-ry;y<cy+ry;y++) {
    for (let x=cx-rx;x<cx+rx;x++) {
      if (x<1||y<1||x>=w-1||y>=h-1) continue;
      const idx=(y*w+x)*4;
      const c =0.299*d[idx]+0.587*d[idx+1]+0.114*d[idx+2];
      const r =0.299*d[idx+4]+0.587*d[idx+5]+0.114*d[idx+6];
      const b =0.299*d[idx+w*4]+0.587*d[idx+w*4+1]+0.114*d[idx+w*4+2];
      if (Math.abs(c-r)>15 || Math.abs(c-b)>15) edgeCount++;
      total++;
    }
  }
  return total>0 ? edgeCount/total : 0;
}

async function runGuideAnalysis() {
  if (!isCameraOn || !video.videoWidth || viewState !== 'MAIN_VIEW') return;

  const W = video.videoWidth, H = video.videoHeight;
  const size = GUIDE_SIZE;
  guideCanvas.width = size; guideCanvas.height = size;

  // 中央の正方形を切り出してサンプリング
  const crop = Math.min(W, H);
  const sx = (W - crop) / 2, sy = (H - crop) / 2;
  guideCtx.drawImage(video, sx, sy, crop, crop, 0, 0, size, size);
  const imageData = guideCtx.getImageData(0, 0, size, size);

  const sharpness   = calcSharpness(imageData, size, size);
  const brightness  = calcCenterBrightness(imageData, size, size);
  const edgeDensity = calcEdgeDensity(imageData, size, size);

  // しきい値（チューニング可能）
  const SHARP_OK    = 6.0;   // ラプラシアン分散のOK閾値
  const SHARP_WARN  = 2.5;   // ピンボケ判定閾値
  const EDGE_OK     = 0.08;  // エッジ密度のOK閾値（被写体あり）
  const BRIGHT_LOW  = 0.06;  // 暗すぎ判定
  const BRIGHT_HIGH = 0.92;  // 明るすぎ判定

  // 判定ロジック（優先度順）
  if (brightness < BRIGHT_LOW) {
    setGuideBanner('🌑', '暗すぎます。明るい場所に移動してください', false);
    guideOkCount = 0;
  } else if (brightness > BRIGHT_HIGH) {
    setGuideBanner('☀️', '明るすぎます。影の中に入るか角度を変えてください', false);
    guideOkCount = 0;
  } else if (edgeDensity < EDGE_OK) {
    setGuideBanner('🔍', '被写体をフレームに入れてください', false);
    guideOkCount = 0;
  } else if (sharpness < SHARP_WARN) {
    setGuideBanner('💫', 'ピンボケです。もっと近づいてください', false);
    guideOkCount = 0;
  } else if (sharpness < SHARP_OK) {
    setGuideBanner('📐', 'もう少し近づくか、手ブレに注意してください', false);
    guideOkCount = 0;
  } else {
    // OK
    guideOkCount++;
    if (guideOkCount >= 2) {
      setGuideReady();
    } else {
      setGuideBanner('✅', 'シャッターを切ってください', true);
    }
  }
}

// 撮影後にガイドを一時非表示→再開
const origCaptureBtnHandler = captureBtn.onclick;

window.addEventListener('beforeunload', () => { if (stream) stream.getTracks().forEach(t=>t.stop()); });
